<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>SenninTube</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header></header>

    <div class="app-layout">
      <aside></aside>

      <main class="main-content">
        <h2
          id="sectionTitle"
          style="margin-bottom: 24px; font-size: 20px; font-weight: 600"
        >
          人気急上昇
        </h2>
        <div class="video-grid" id="mainGrid"></div>
      </main>
    </div>

    <div class="modal-overlay" id="customModalOverlay" onclick="closeCustomModal()"></div>
    <div class="playlist-modal" id="customPlaylistModal">
      <h3 style="margin-bottom: 16px; font-size: 16px; font-weight: 500; color: var(--text-primary);">新しいプレイリスト</h3>
      <input 
        type="text" 
        id="customPlaylistInput" 
        placeholder="プレイリスト名を入力" 
        style="width: 100%; background: none; border: none; border-bottom: 2px solid var(--border); color: var(--text-primary); padding: 8px 0; font-size: 14px; outline: none; margin-bottom: 24px;"
        onfocus="this.style.borderBottomColor='var(--text-primary)'"
        onblur="this.style.borderBottomColor='var(--border)'"
      />
      <div style="display: flex; justify-content: flex-end; gap: 8px;">
        <button onclick="closeCustomModal()" style="background: none; border: none; color: var(--text-primary); padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: 500; border-radius: 18px;">キャンセル</button>
        <button onclick="submitCustomPlaylist()" style="background: none; border: none; color: #3ea6ff; padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: 500; border-radius: 18px;">作成</button>
      </div>
    </div>

    <script src="/js/storage.js"></script>
    <script src="/js/layout.js"></script>
    <script>
      const mainGrid = document.getElementById("mainGrid");
      const sectionTitle = document.getElementById("sectionTitle");
      let currentMode = "home";

      function showSkeletons() {
        mainGrid.innerHTML = "";
        for (let i = 0; i < 12; i++) {
          mainGrid.innerHTML += `
          <div class="skeleton-card">
            <div class="skeleton-thumb"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text short"></div>
          </div>
        `;
        }
      }

      async function loadTrending() {
        showSkeletons();
        sectionTitle.innerText = "人気急上昇";
        try {
          const res = await fetch("/api/trending");
          const data = await res.json();
          renderVideos(data.items || []);
        } catch (e) {
          mainGrid.innerHTML = "";
        }
      }

      async function doSearch(q) {
        showSkeletons();
        sectionTitle.innerText = `「${q}」の検索結果`;
        try {
          const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
          const data = await res.json();
          renderVideos(data.items || []);
        } catch (e) {
          mainGrid.innerHTML = "";
        }
      }

      function renderVideos(items, isCustomList = false, listKey = null) {
        mainGrid.innerHTML = items.length
          ? ""
          : "<p style='padding:12px; color:var(--text-secondary);'>動画が見つかりません</p>";
        items.forEach((item) => {
          const card = document.createElement("div");
          card.className = "video-card";

          // サムネイルを公式URLからフロントエンドで直接取得・構築
          const thumb = item.id
            ? `https://i.ytimg.com/vi/${item.id}/mqdefault.jpg`
            : item.thumbnail?.url || item.thumbnail || "";
          const title = item.title || item.videoTitle;
          const author =
            item.author?.name || item.channelTitle || item.channelName || "";

          // チャンネルアイコン（アバター）をYouTube公式（yt3.ggpht.com）ベース等からフロントエンドで確実に解決・構築
          const channelId = item.author?.id || item.channelId || "";
          let avatarUrl = "";

          if (item.authorThumbnails && item.authorThumbnails.length > 0) {
            const sortedThumbs = item.authorThumbnails.sort(
              (a, b) => b.width - a.width
            );
            avatarUrl = sortedThumbs[0].url;
          } else if (
            item.channelImage &&
            (item.channelImage.startsWith("http") ||
              item.channelImage.startsWith("//"))
          ) {
            avatarUrl = item.channelImage;
          }

          // URLが未設定、またはミラー等になっている場合に、YouTube公式ドメイン(yt3.ggpht.com)を参照・代替できるようにフォールバックを構築
          if (!avatarUrl || avatarUrl.includes("mirror.unbanned-analytics.com")) {
            if (channelId) {
              avatarUrl = `https://yt3.ggpht.com/v2/image/channels/${channelId}/placeholder`;
            } else {
              avatarUrl = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 36 36'><circle cx='18' cy='18' r='18' fill='%23333'/></svg>";
            }
          }

          card.innerHTML = `
          <div class="thumbnail-container">
            <img src="${thumb}" alt="">
          </div>
          <div class="video-info-row">
            <div class="video-avatar" style="background-image: url('${avatarUrl}'), url('https://yt3.ggpht.com/a/default-user=s88-c-k-c0x00ffffff-no-rj'); background-size: cover; background-position: center; width: 36px; height: 36px; border-radius: 50%;"></div>
            <div class="video-details">
              <div class="video-title">${title}</div>
              <div class="video-author">${author}</div>
              ${
                isCustomList
                  ? `<button onclick="event.stopPropagation(); removeCustom('${listKey}', '${item.id}')" style="background:none; border:none; color:var(--accent); font-size:12px; cursor:pointer; margin-top:6px;">削除</button>`
                  : ""
              }
            </div>
          </div>
        `;
          card.onclick = () => {
            window.location.href = `/watch.html?v=${item.id}`;
          };
          mainGrid.appendChild(card);
        });
      }

      function changeSection(mode, playlistName = null) {
        currentMode = mode;
        document
          .querySelectorAll("aside .side-item")
          .forEach((el) => el.classList.remove("active"));

        if (mode === "home") {
          loadTrending();
          const btn = document.getElementById("sideHomeBtn");
          if (btn) btn.classList.add("active");
        } else if (mode === "history") {
          sectionTitle.innerText = "再生履歴";
          renderVideos(StorageManager.get("history"), true, "history");
          const btn = document.getElementById("sideHistoryBtn");
          if (btn) btn.classList.add("active");
        } else if (mode === "favorites") {
          sectionTitle.innerText = "お気に入り";
          renderVideos(StorageManager.get("favorites"), true, "favorites");
          const btn = document.getElementById("sideFavBtn");
          if (btn) btn.classList.add("active");
        } else if (mode === "watch-later") {
          sectionTitle.innerText = "後で見る";
          renderVideos(StorageManager.get("watch-later"), true, "watch-later");
          const btn = document.getElementById("sideLaterBtn");
          if (btn) btn.classList.add("active");
        } else if (mode === "playlist" && playlistName) {
          sectionTitle.innerText = `プレイリスト: ${playlistName}`;
          const p = StorageManager.getPlaylists()[playlistName] || [];
          renderVideos(p, true, `playlist:${playlistName}`);
        }
      }

      function removeCustom(key, id) {
        if (key.startsWith("playlist:")) {
          const pName = key.split(":")[1];
          StorageManager.removeFromPlaylist(pName, id);
          changeSection("playlist", pName);
        } else {
          StorageManager.remove(key, id);
          changeSection(key);
        }
        renderSidebarPlaylists();
      }

      // 独自UIモーダルを開く関数
      function promptCreatePlaylist() {
        const modal = document.getElementById("customPlaylistModal");
        const overlay = document.getElementById("customModalOverlay");
        const input = document.getElementById("customPlaylistInput");
        if (modal && overlay && input) {
          input.value = "";
          modal.style.display = "block";
          overlay.style.display = "block";
          input.focus();
        }
      }

      // 独自UIモーダルを閉じる関数
      function closeCustomModal() {
        const modal = document.getElementById("customPlaylistModal");
        const overlay = document.getElementById("customModalOverlay");
        if (modal && overlay) {
          modal.style.display = "none";
          overlay.style.display = "none";
        }
      }

      // 独自UIモーダルでの確定処理
      function submitCustomPlaylist() {
        const input = document.getElementById("customPlaylistInput");
        if (input) {
          const name = input.value;
          if (name && name.trim()) {
            StorageManager.createPlaylist(name.trim());
            renderSidebarPlaylists();
          }
        }
        closeCustomModal();
      }

      function renderSidebarPlaylists() {
        const container = document.getElementById("sidebarPlaylists");
        if (!container) return;
        container.innerHTML = "";
        const playlists = StorageManager.getPlaylists();
        Object.keys(playlists).forEach((name) => {
          const btn = document.createElement("button");
          btn.className = "side-item";
          btn.innerHTML = `<span class="material-symbols-outlined">playlist_play</span><span class="side-text">${name}</span>`;
          btn.onclick = () => changeSection("playlist", name);
          container.appendChild(btn);
        });
      }

      window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get("q");

        // コンポーネントをロード（アクティブ状態を確定）
        await initCommonComponents(q ? "home" : "home");

        if (q) {
          doSearch(q);
        } else {
          loadTrending();
        }
      };
    </script>
  </body>
</html>
